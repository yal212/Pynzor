http:
  timeout: 10
  max_retries: 3
  rate_limit: 0.1
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
  follow_redirects: true
  verify_ssl: true
  max_redirects: 5

scanner:
  common_ports: [21, 22, 23, 25, 53, 80, 110, 143, 443, 445, 993, 995, 3306, 3389, 5432, 5900, 6379, 8080, 8443, 27017]
  timeout: 3
  concurrent: 50

fuzzer:
  threads: 20
  status_codes: [200, 201, 204, 301, 302, 307, 401, 403]
  extensions: ["", ".php", ".html", ".htm", ".asp", ".aspx", ".jsp", ".txt"]
  wordlist: "wordlists/common-dirs.txt"

sqli:
  max_payloads: 20
  threads: 5
  rate_limit: 0.2

xss:
  max_payloads: 20
  threads: 5
  rate_limit: 0.2

subdomain:
  threads: 20
  check_http: true
  wordlist: "wordlists/subdomains.txt"

headers:
  security_headers:
    - strict-transport-security
    - content-security-policy
    - x-frame-options
    - x-content-type-options
    - x-xss-protection
    - referrer-policy
    - permissions-policy
    - cross-origin-opener-policy
    - cross-origin-embedder-policy
    - cross-origin-resource-policy

output:
  format: "json"
  directory: "./reports"
  verbose: false
  no_color: false
  progress: true

wordlists:
  directories: "wordlists/common-dirs.txt"
  parameters: "wordlists/common-params.txt"
  subdomains: "wordlists/subdomains.txt"